name: Deploy Hugo site to Pages

on:
  # 当向 main 分支推送代码时触发
  push:
    branches:
      - main
  # 允许你在 Actions 页面手动运行
  workflow_dispatch:

# 设置权限，允许部署到 GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 只允许一个并发部署
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取你的代码
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive  # 如果你的主题用了 Git 子模块，这行很重要
          fetch-depth: 0

      # 2. 安装 Hugo (使用 Extended 版本以支持 Sass 等特性)
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: 'latest'
          extended: true

      # 3. 构建 Hugo 网站 (生成 public 文件夹)
      - name: Build with Hugo
        run: hugo --minify --baseURL "${{ steps.pages.outputs.base_url }}/"

      # 4. 上传构建产物 (public 文件夹)
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      # 5. 部署到 GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
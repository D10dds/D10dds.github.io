baseURL: "https://D10dds.github.io/"
title: "D10"
theme: hugo-profile

# Multilingual configuration
defaultContentLanguage: "en"
defaultContentLanguageInSubdir: false

languages:
  en:
    locale: "en-us"
    label: "English"
    weight: 1
    contentDir: "content"
    menu:
      main:
        - identifier: blog
          name: Blog
          title: Blog posts
          url: /blogs
          weight: 1
        - identifier: gallery
          name: Gallery
          title: Image gallery
          url: /gallery
          weight: 2
outputs:
  home:
    - "HTML"
    - "RSS"
    - "JSON"
  page:
    - "HTML"
    - "RSS"

enableRobotsTXT: true

#services:
  #googleAnalytics:
    #id: G-MEASUREMENT_ID
  #disqus:
    #shortname: your-disqus-shortname

pagination:
  pagerSize: 3

markup:
  goldmark:
    renderer:
      unsafe: true

Menus:
  main:
    - identifier: gallery
      name: Gallery
      title: Gallery
      url: /gallery
      weight: 2
    #Dropdown menu
    # - identifier: dropdown
    #   title: Example dropdown menu
    #   name: Dropdown
    #   weight: 3
    # - identifier: dropdown1
    #   title: example dropdown 1
    #   name: example 1
    #   url: /#
    #   parent: dropdown
    #   weight: 1
    # - identifier: dropdown2
    #   title: example dropdown 2
    #   name: example 2
    #   url: /#
    #   parent: dropdown
    #   weight: 2

params:
  title: "Hugo Profile"
  description: Text about my cool site
  # staticPath: ""  # The path to serve the static files from
  favicon: "/fav.png"

  # Whether to serve bootstrap css and js files from CDN or not. Can be set to true, "css" or "js" to choose between
  # serving both, only the css, or only the js files through the CDN. Any other value will make so that CDN is not used.
  # Note the lack of "" in true, it should be of boolean type.
  useBootstrapCDN: false

  # If you want to load dynamically responsive images from Cloudinary
  # This requires your images to be uploaded + hosted on Cloudinary
  # Uncomment and change YOUR_CLOUD_NAME to the Cloud Name in your Cloudinary console
  # cloudinary_cloud_name: "YOUR_CLOUD_NAME"

  # Whether to add mathjax support on all pages. Alternatively, you can opt-in per page by adding `mathjax: true` in the frontmatter.
  mathjax: false

  # Whether the fade animations on the home page will be enabled
  animate: true

  theme:
    # disableThemeToggle: true
    # defaultTheme: "light" # dark

  font:
    fontSize: 1rem # default: 1rem
    fontWeight: 400 # default: 400
    lineHeight: 1.5 # default: 1.5
    textAlign: left # default: left

  # color preference
  # When using hex codes for colors, quotations must be used along with the # sign
  # color:
  #   textColor: "#343a40"
  #   secondaryTextColor: "#6c757d"
  #   textLinkColor: "#007bff"
  #   backgroundColor: "#eaedf0"
  #   secondaryBackgroundColor: "#64ffda1a"
  #   primaryColor: "#007bff"
  #   secondaryColor: "#f8f9fa"

  #   darkmode:
  #     textColor: "#e4e6eb"
  #     secondaryTextColor: "#b0b3b8"
  #     textLinkColor: "#ffffff"
  #     backgroundColor: "#18191a"
  #     secondaryBackgroundColor: "#212529"
  #     primaryColor: "#ffffff"
  #     secondaryColor: "#212529"

  # If you want to customize the menu, you can change it here
  navbar:
    align: ms-auto # Left: ms-auto | center: mx-auto | right: me-auto | Default: ms-auto
    # brandLogo: "/logo.png" # Logo for the brand | default is the favicon variable
    showBrandLogo: false # Show brand logo in nav bar | default is true
    brandName: "Dai Yining" # Brand name for the brand | default is the title variable
    disableSearch: false
    # searchPlaceholder: "Search"
    stickyNavBar:
      enable : true
      showOnScrollUp : true
    enableSeparator: false
    menus:
      disableAbout: false
      disableExperience: false
      disableEducation: false
      disableProjects: false
      disableAchievements: true
      disableContact: false

  # Hero
  hero:
    enable: true
    intro: "Hi, my name is"
    title: "Dai Yining."
    subtitle: "Industrial Design Undergraduate,Future HCI Researcher"
    content: "Interested in Human-Computer Interaction, Wearable Computing, Reflective AI and User Experience Design."
    image: /images/touxiang.jpg
    bottomImage:
      enable: true
    # roundImage: true # Make hero image circular | default false
    button:
      enable: true
      name: "CV"
      url: "/files/DaiYining_CV.docx"
      download: true
      newPage: false
    socialLinks:
      
      

  # About
  about:
    enable: true
    title: "About Me"
    image: "/images/me.jpg"
    content: I am an undergraduate student in Industrial Design at the China Academy of Art. My research interests focus on Human-computer Interaction (HCI), wearable computing, and AI-assisted reflective interaction. This website presents my research proposal, interactive projects, and technical work.
      
    skills:
      enable: true
      title: "Here are a few technologies I've been working with recently:"
      items:
        - "React/JavaScript"
        - "User-centered Design"
        - "System Design"
        - "Rapid Prototyping"
        - "Processing"
        - "Arduino"

  # Experience
  experience:
    enable: true
    # title: "Custom Name"
    items:
      - company: "Zhejiang University International Design Institute"
        jobs:
          - name: "UI/UX Designer (Intern)"
            date: "Dec 2024 - Jun 2025"
            content: |
              Project: Bosideng Group B-end AI Design Platform UI/UX Design

              - As a core designer, independently owned the end-to-end UX/UI design for a B-end AI platform enabling designers to rapidly generate fashion design images. Led the interaction optimization for 5+ core AI-driven features, including Text-to-Image, Image Variation, and Scene Viewing.
              - Developed and maintained a reusable design system based on Ant Design, improving the component reuse rate for the front-end development team and ensuring long-term visual and interaction consistency.
              - Collaborated closely with product managers and front-end engineers, leading design reviews, walkthroughs, and high-fidelity prototype delivery to ensure accurate implementation and successful system launch.

          - name: "UI/UX Designer (Intern)"
            date: "Jun 2024 - Dec 2024"
            content: |
              Project: International Academic Database Website UI/UX Redesign

              - Led the UI visual and interaction redesign for an academic database website targeting international users, defining a modern design language that aligns with the target audience's aesthetics and usage patterns.
              - Significantly improved content discoverability and browsing experience by optimizing the information architecture and navigation flow.
              - Ensured high-fidelity, responsive implementation across devices through close collaboration with the development team.

          - name: "Visual & Interaction Design Lead"
            date: "Jun 2023 - Nov 2023"
            content: |
              National College Student Innovation and Entrepreneurship Competition - Silver Award (National Top 2%)

              Collaboration with Zhejiang University Computer Science Department

              - Served as the core design lead in a 5-member interdisciplinary team, establishing the complete visual identity and UI/UX design (covering mobile app and web admin panel) from scratch for the project "Professional Large Language Model Applications in New Liberal Arts."
              - Designed and implemented a key interactive data visualization dashboard that transformed complex LLM outputs into intuitive visual insights, effectively enhancing decision-making efficiency for target users (liberal arts researchers).
              - Coordinated design, technical development, and business logic throughout the project, ensuring the final deliverable was user-friendly, technically viable, and presented a clear business narrative.

  # Education
  education:
    enable: true
    # title: "Custom Name"
    index: false
    items:
      - title: "Bachelor of Engineering, Industrial Design"
        school:
          name: "China Academy of Art"
        date: "Sep 2022 - Jul 2026"
        GPA: "3.3"
        content: |-
          Relevant Coursework: Interaction Design, User Experience Research, Visual Communication, Product Prototyping
  # Achievements
  achievements:
    enable: false
    # title: "Custom Name"
    items:
      - title: Google kickstart runner
        content: I solved all problems with optimal solution.
        url: https://example.com
        image: /images/achievement.jpg
      - title: Facebook Hackathon Winner
        content: Developed a product using Artificial Intelligence.
        image: /images/achievement.jpg
      - title: Hugo Profile
        content: Developed a theme and getting 1K+ downloads per month.
        url: "https://github.com/gurusabarish/hugo-profile"
        image: /images/achievement.jpg
      - title: Microsoft Imagine Runner
        content: We are developed a product which can help others.
      - title: Google Summer of Code
        content: Contributed to a open source project.
        url: https://example.com

  # projects
  projects:
    enable: true
    # title: "Custom Name"
    items:
      - title: Bosideng B-end AI Design Platform
        content: UI/UX design for a B-end AI platform enabling designers to rapidly generate fashion design images. Led interaction optimization for 5+ core AI-driven features including Text-to-Image, Image Variation, and Scene Viewing.
        image: /images/projects/bosideng.png
        featured:
          name: View PDF
          link: /files/projects/bosideng.pdf
        badges:
          - "UI/UX"
          - "B-end"
          - "AI Platform"

      - title: Daily Planner App for College Girls
        content: A daily planner and schedule management app designed for college female students, focusing on friendly visual style and intuitive task tracking experience.
        image: /images/projects/ui1.png
        featured:
          name: View PDF
          link: /files/projects/ui1.pdf
        badges:
          - "UI/UX"
          - "Mobile App"
          - "Coursework"

      - title: Academic Database Website Redesign
        content: Led the UI visual and interaction redesign for an academic database website targeting international users. Improved content discoverability and browsing experience through information architecture and navigation optimization.
        image: /images/projects/ui2.png
        featured:
          name: View PDF
          link: /files/projects/ui2.pdf
        badges:
          - "UI/UX"
          - "Redesign"
          - "Responsive"

      - title: Graduation Project - Image Particle Sampler
        content: An interactive image particle sampling tool developed as a graduation project, combining visual design and creative coding to transform images into dynamic particle-based visual outputs.
        image: /images/projects/bishe.jpg
        featured:
          name: Download
          link: /files/projects/imageParticleSampler.zip
        badges:
          - "Creative Coding"
          - "Graduation Project"
          - "Interactive"

      - title: HZWK Tech Corporate Website
        content: A corporate website for HZWK Technology, independently designed and developed from scratch. Covered the full process from visual design to front-end implementation.
        image: /images/projects/wuke.png
        featured:
          name: Visit Website
          link: https://hzwktech.com/
        badges:
          - "Web Design"
          - "Front-end"
          - "Corporate"

      - title: Talking Tom Kids AI Toy App
        content: UI design for a children's AI toy app based on the Talking Tom IP. Designed a kid-friendly interaction experience tailored for young users and connected to the smart hardware product.
        image: /images/projects/tongban.png
        featured:
          name: Download
          link: https://apph5-prod.xidongai.com/?bindType=1
        badges:
          - "UI/UX"
          - "Kids App"
          - "AI Toy"

      - title: Wearable Body Awareness Support System
        content: High-fidelity design and detailed execution plan for a wearable body awareness support system as graduate school application research proposal.
        image: /images/projects/rp.png
        featured:
          name: View Document
          link: /files/projects/wearable.docx
        badges:
          - "Research"
          - "Wearable Computing"
          - "Proposal"

  #Contact
  contact:
    enable: true
    # title: "Custom Name"
    content: My inbox is always open. Whether you have a question or just want to say hi, I will try my best to get back to you. You can reach me at dai_yining@qq.com.
    btnName: Mail me
    btnLink: mailto:dai_yining@qq.com
    # formspree:
